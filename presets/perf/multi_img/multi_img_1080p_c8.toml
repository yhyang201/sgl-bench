# TTFT benchmark: ~9.3k text + ~10k image tokens (5x 1080p), output 300, concurrency 8

[benchmark]
extra_args = """
    --backend sglang-oai-chat
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 8
    --random-input-len 9300
    --random-output-len 300
    --image-count 5
    --image-resolution 1080p
"""
