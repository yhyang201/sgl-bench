# TTFT benchmark: ~9.3k text + ~10k image tokens (3x 2k), output 300, concurrency 4

[benchmark]
extra_args = """
    --backend sglang-oai-chat
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 4
    --random-input-len 9300
    --random-output-len 300
    --image-count 3
    --image-resolution 1440x2560
"""
