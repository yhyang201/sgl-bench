# Performance: Image benchmark - 1 image(s), 1080p, concurrency 16

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 16
    --random-input-len 512
    --random-output-len 256
    --image-count 1
    --image-resolution 1080p
"""
