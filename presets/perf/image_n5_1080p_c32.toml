# Performance: Image benchmark - 5 image(s), 1080p, concurrency 32

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 32
    --random-input-len 512
    --random-output-len 256
    --image-count 5
    --image-resolution 1080p
"""
