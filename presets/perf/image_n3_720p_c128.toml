# Performance: Image benchmark - 3 image(s), 720p, concurrency 128

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 128
    --random-input-len 512
    --random-output-len 256
    --image-count 3
    --image-resolution 720p
"""
