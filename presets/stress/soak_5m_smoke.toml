# Stress: 5-minute smoke test for quick validation

[stress]
duration_minutes = 5
max_concurrency = 8
request_rate = "inf"
pool_size = 5

image_count_range = [1, 3]
image_resolutions = ["720p", "1080p"]
input_len_range = [256, 2048]
output_len_range = [64, 256]

health_check_interval_s = 15
window_minutes = 1
