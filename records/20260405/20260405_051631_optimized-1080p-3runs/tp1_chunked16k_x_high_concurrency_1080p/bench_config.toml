# ViT batching benchmark - high concurrency, 1080p, 3 runs

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate inf
    --max-concurrency 16
    --random-input-len 512
    --random-output-len 64
    --random-range-ratio 1.0
    --image-count 1
    --image-resolution 1080p
"""

[run]
runs = 3
