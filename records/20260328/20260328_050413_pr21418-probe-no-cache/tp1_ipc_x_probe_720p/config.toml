# Server: Qwen3-VL-8B-Instruct (1x GPU, CUDA IPC transport, no pool cache)

[server]
model_path = "Qwen/Qwen3-VL-8B-Instruct"
extra_args = "--port 30000 --tp-size 1 --enable-multimodal --enable-mixed-chunk --tokenizer-worker-num 16 --max-running-requests 128 --max-prefill-tokens 65536"
env = { SGLANG_USE_CUDA_IPC_TRANSPORT = "1" }
