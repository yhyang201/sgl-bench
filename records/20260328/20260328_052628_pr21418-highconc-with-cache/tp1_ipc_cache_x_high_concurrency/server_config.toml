# Server: Qwen3-VL-8B-Instruct (1x GPU, CUDA IPC transport + pool handle cache)
# Tests PR #21418: SGLANG_USE_IPC_POOL_HANDLE_CACHE

[server]
model_path = "Qwen/Qwen3-VL-8B-Instruct"
extra_args = "--port 30000 --tp-size 1 --enable-multimodal"
env = { SGLANG_USE_CUDA_IPC_TRANSPORT = "1", SGLANG_USE_IPC_POOL_HANDLE_CACHE = "1" }
