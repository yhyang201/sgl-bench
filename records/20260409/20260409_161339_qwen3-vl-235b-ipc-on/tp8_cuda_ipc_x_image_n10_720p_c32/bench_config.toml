# Performance: Image benchmark - 10 image(s), 720p, concurrency 32

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 32
    --random-input-len 512
    --random-output-len 256
    --image-count 10
    --image-resolution 720p
"""
