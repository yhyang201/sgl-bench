# Performance: Image benchmark - 2 image(s), 720p, concurrency 128

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate inf
    --max-concurrency 128
    --random-input-len 512
    --random-output-len 32
    --image-count 2
    --image-resolution 720p
"""

[run]
runs = 3
