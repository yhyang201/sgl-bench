# Performance: Image benchmark - 1 image(s), 720p, concurrency 16

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate inf
    --max-concurrency 16
    --random-input-len 512
    --random-output-len 32
    --image-count 1
    --image-resolution 720p
"""

[run]
runs = 3
