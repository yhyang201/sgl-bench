# Performance: Image benchmark - 10 image(s), 1080p, concurrency 32

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate inf
    --max-concurrency 32
    --random-input-len 512
    --random-output-len 32
    --image-count 10
    --image-resolution 1080p
"""

[run]
runs = 3
