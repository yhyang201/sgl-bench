# TTFT benchmark: ~9.3k text + ~10k image tokens (11x 720p), output 300, concurrency 2

[benchmark]
extra_args = """
    --backend sglang
    --dataset-name image
    --num-prompts 128
    --request-rate 1.0
    --max-concurrency 2
    --random-input-len 9300
    --random-output-len 300
    --image-count 11
    --image-resolution 720p
"""
