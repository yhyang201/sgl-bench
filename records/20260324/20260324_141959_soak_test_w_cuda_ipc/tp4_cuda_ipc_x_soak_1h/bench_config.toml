# Stress: 1-hour soak test with randomized multi-image requests

[stress]
duration_minutes = 60
max_concurrency = 32
request_rate = "inf"
pool_size = 50

# Randomization ranges
image_count_range = [1, 10]
image_resolutions = ["720p", "1080p", "1440x2560"]
input_len_range = [256, 8192]
output_len_range = [64, 512]

health_check_interval_s = 30
window_minutes = 5
