# Cache: Run all three cache hit rate scenarios
# A) same_image_reuse — same image, different text across phases
# B) partial_prefix_sharing — shared + divergent images (mm_split key test)
# C) multiturn_image — multi-turn conversation with growing prefix

[cache]
scenarios = ["same_image_reuse", "partial_prefix_sharing", "multiturn_image"]
num_clients = 4
output_len = 16
image_resolution = "720p"
text_input_len = 128
max_concurrency = 8
seed = 42

[cache.same_image_reuse]
num_images = 1
num_phases = 2
requests_per_phase = 4

[cache.partial_prefix_sharing]
shared_images = 1
divergent_images = 1
num_phases = 2
requests_per_phase = 4

[cache.multiturn_image]
num_images = 1
num_rounds = 3
sub_question_len = 64
